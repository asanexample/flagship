name: Deploy

# Thin caller (ADR-067 / ADR-071). The supply-chain backbone lives in the app-team-unwritable
# asanexample/trusted-ci repo:
#   build      -> build-sign.yml       builds from the Dockerfile, pushes to team-platform/flagship-server,
#                                       cosign-signs the image + attaches a CycloneDX SBOM.
#   provenance -> slsa-provenance.yml   attaches the SLSA build provenance (SLSA L3, isolated signer).
#   promote    -> promote.yml           records the deployed digest in the platform control-plane repo
#                                        (a gated PR bumping gitops/releases/platform/flagship/dev.yaml); the
#                                        per-Product ApplicationSet injects it. THIS repo's main is NEVER written
#                                        by CI (no contents:write), so it stays fully protected (ADR-071).
#
# Prereq: the Product must be registered (gitops/products/platform/flagship.yaml) and github-oidc applied so the
# per-Product push role github-actions-ecr-push-product-platform-flagship exists (ADR-069).

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - '**/*.md'

permissions:
  id-token: write
  contents: read

jobs:
  build:
    permissions:
      id-token: write # OIDC: AWS (ECR push) + cosign keyless signing
      contents: read
    uses: asanexample/trusted-ci/.github/workflows/build-sign.yml@7a739dcd25cff26ac7c33f2301166a1c34301b6c
    with:
      app: flagship-server # product-scoped image: team-platform/flagship-server
      product: flagship # selects the per-Product OIDC role github-actions-ecr-push-product-platform-flagship
      tag: ${{ github.sha }}

  provenance:
    needs: build
    permissions:
      id-token: write
      contents: read
    uses: asanexample/trusted-ci/.github/workflows/slsa-provenance.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      image: ${{ needs.build.outputs.image }}
      digest: ${{ needs.build.outputs.digest }}
      product: flagship

  promote:
    needs: [build, provenance]
    permissions:
      id-token: write
      contents: read
    uses: asanexample/trusted-ci/.github/workflows/promote.yml@28dbe1b66c2be6b05801575617d307cafd4a67e7
    with:
      product: flagship
      service: server
      stage: dev
      digest: ${{ needs.build.outputs.digest }}
