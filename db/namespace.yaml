# Platform namespace for Flagship's database. Deliberately NOT an environment namespace (no
# platform.refplat.org/team label) — so none of the tenant sandbox applies (Kyverno environment policies,
# per-product image scoping, the default-deny-ingress netpol). A CNPG database is operator-managed,
# API-watching, and operator-polled; it runs cleanly here exactly like backstage-db / keycloak-db /
# triage-copilot-db, none of which live in an environment namespace. (ADR-099; ADR-081 amendment follow-up.)
apiVersion: v1
kind: Namespace
metadata:
  name: platform-flagship-db
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: flagship
    platform.refplat.org/runtime: platform-database
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
