# Named ServiceAccount Flagship's pods run as. No eks.amazonaws.com/role-arn (IRSA is denied in environment
# namespaces); if Flagship ever needs AWS it's granted via Pod Identity declared in the Environment claim's
# services.server.permissions.aws (ADR-041/067). Flagship talks to Postgres + serves HTTP, not the K8s API.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-platform
  labels:
    app.kubernetes.io/name: app-platform
